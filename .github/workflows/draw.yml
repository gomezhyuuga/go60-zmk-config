name: Draw keymap

on:
  push:
    paths:
      - config/go60.keymap
      - config/info.json
      - .github/workflows/draw.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  draw:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install keymap-drawer
        run: pip install keymap-drawer

      - name: Render keymap
        run: |
          mkdir -p keymap-drawer
          {
            echo 'layout: {qmk_info_json: config/info.json}'
            keymap parse -z config/go60.keymap | grep -v '^layout:'
          } > keymap-drawer/keymap.yaml
          keymap draw keymap-drawer/keymap.yaml > keymap-drawer/keymap.svg

      - name: Commit rendered keymap
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add keymap-drawer/keymap.yaml keymap-drawer/keymap.svg
          if git diff --staged --quiet; then
            echo "No keymap-drawer changes to commit."
          else
            git commit -m "[Draw] update keymap rendering"
            git push
          fi
